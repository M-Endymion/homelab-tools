<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelab Status • Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .status-dot { animation: pulse 2s infinite; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

<div class="max-w-7xl mx-auto p-8">
    <div class="flex justify-between items-baseline mb-10">
        <div>
            <h1 class="text-5xl font-bold tracking-tight">Homelab Status</h1>
            <p class="text-emerald-400 flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                    <span class="status-dot absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                All systems nominal • Last updated <span id="last-updated" class="font-mono">just now</span>
            </p>
        </div>
        <button onclick="refreshAll()" 
                class="bg-white text-zinc-900 px-6 py-3 rounded-2xl font-semibold flex items-center gap-2 hover:bg-emerald-400 hover:text-white transition-colors">
            <i class="fas fa-sync"></i>
            <span>Refresh All</span>
        </button>
    </div>

    <!-- Proxmox -->
    <div class="mb-10">
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fas fa-server"></i> Proxmox Nodes</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="proxmox-grid">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Docker -->
    <div class="mb-10">
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fab fa-docker"></i> Docker Containers</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="docker-grid">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Services -->
    <div>
        <h2 class="text-xl font-semibold mb-4">Key Services</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6" id="services-grid">
            <!-- Populated by JS -->
        </div>
    </div>

    <div class="mt-16 text-center text-zinc-500 text-sm">
        Homelab Status Dashboard • Built for portfolio • 
        <a href="https://github.com/M-Endymion/homelab-tools" class="hover:text-white">View on GitHub</a>
    </div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    // Replace these with your real endpoints when ready
    const CONFIG = {
        proxmox: { url: "https://your-proxmox:8006", user: "", password: "" },
        docker: { url: "http://localhost:2375" },   // Enable Docker HTTP API first
        tailscale: { enabled: true }
    };

    // ==================== MOCK DATA (for immediate demo) ====================
    function loadMockData() {
        // Proxmox
        document.getElementById('proxmox-grid').innerHTML = `
            <div class="bg-zinc-900 rounded-3xl p-6 card">
                <div class="flex justify-between"><span class="font-medium">pve-node1</span><span class="text-emerald-400">Online</span></div>
                <div class="mt-4 text-4xl font-semibold">87% CPU</div>
                <div class="text-zinc-400">42 VMs • 128 GB RAM</div>
            </div>
            <div class="bg-zinc-900 rounded-3xl p-6 card">
                <div class="flex justify-between"><span class="font-medium">pve-node2</span><span class="text-emerald-400">Online</span></div>
                <div class="mt-4 text-4xl font-semibold">64% CPU</div>
                <div class="text-zinc-400">31 VMs • 96 GB RAM</div>
            </div>
        `;

        // Docker
        document.getElementById('docker-grid').innerHTML = `
            <div class="bg-zinc-900 rounded-3xl p-6 card flex items-center gap-4">
                <i class="fab fa-docker text-4xl text-blue-500"></i>
                <div><div class="font-medium">Jellyfin</div><div class="text-emerald-400 text-sm">Running</div></div>
            </div>
            <!-- Add more containers as needed -->
        `;

        // Update timestamp
        document.getElementById('last-updated').textContent = "just now";
    }

    // ==================== REFRESH FUNCTION ====================
    function refreshAll() {
        const btn = document.querySelector('button');
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Refreshing...`;
        
        setTimeout(() => {
            loadMockData();
            btn.innerHTML = `<i class="fas fa-sync"></i> Refresh All`;
        }, 1400);
    }

    // Load initial data
    window.onload = loadMockData;
</script>
</body>
</html>
