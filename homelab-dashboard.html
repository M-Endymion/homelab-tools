<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelab Status • Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="config.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); }
        .status-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

<div class="max-w-7xl mx-auto p-8">
    <div class="flex justify-between items-baseline mb-10">
        <div>
            <h1 class="text-5xl font-bold tracking-tight">Homelab Status</h1>
            <p class="text-emerald-400 flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                    <span class="status-dot absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                Live • Last updated <span id="last-updated">just now</span>
            </p>
        </div>
        <button onclick="refreshAll()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
            <i class="fas fa-sync"></i> Refresh All
        </button>
    </div>

    <!-- Proxmox Nodes -->
    <div class="mb-12">
        <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3"><i class="fas fa-server"></i> Proxmox Nodes</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="proxmox-grid"></div>
    </div>

    <div class="text-center text-zinc-500 text-sm mt-16">
        Homelab Status Dashboard • <a href="https://github.com/M-Endymion/homelab-tools" class="hover:text-white">View on GitHub</a>
    </div>
</div>

<script>
    async function proxmoxLogin(node) {
        const response = await fetch(`${node.url}/api2/json/access/ticket`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                username: node.username,
                password: node.password
            })
        });
        const data = await response.json();
        return data.data.ticket;
    }

async function fetchProxmoxNodes() {
    const grid = document.getElementById('proxmox-grid');
    grid.innerHTML = '<p class="text-zinc-400">Connecting to Proxmox...</p>';

    for (const node of CONFIG.proxmox) {
        try {
            let headers = {};

            if (node.token) {
                // API Token authentication
                headers = {
                    'Authorization': `PVEAPIToken=${node.token}`
                };
            } else if (node.username && node.password) {
                // Fallback to ticket login
                const ticketRes = await fetch(`${node.url}/api2/json/access/ticket`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        username: node.username,
                        password: node.password
                    })
                });
                const ticketData = await ticketRes.json();
                headers = { 'Cookie': `PVEAuthCookie=${ticketData.data.ticket}` };
            }

            const statusRes = await fetch(`${node.url}/api2/json/nodes`, { headers });
            if (!statusRes.ok) throw new Error('Failed to fetch nodes');

            const data = await statusRes.json();

            let html = '';
            data.data.forEach(n => {
                html += `
                    <div class="bg-zinc-900 rounded-3xl p-8 card">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-semibold text-lg">${n.node}</p>
                                <p class="text-emerald-400">Online</p>
                            </div>
                            <i class="fas fa-server text-5xl text-emerald-500 opacity-20"></i>
                        </div>
                        <div class="mt-8 grid grid-cols-2 gap-4 text-sm">
                            <div>CPU: <span class="font-mono">${(n.cpu*100).toFixed(0)}%</span></div>
                            <div>RAM: <span class="font-mono">${Math.round(n.mem/1024/1024/1024)}/${Math.round(n.maxmem/1024/1024/1024)} GB</span></div>
                            <div>VMs: <span class="font-mono">${n.vms}</span></div>
                            <div>Uptime: <span class="font-mono">${Math.round(n.uptime/86400)}d</span></div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;

        } catch (err) {
            console.error(err);
            grid.innerHTML += `
                <div class="bg-red-900/30 p-8 rounded-3xl">
                    <p class="text-red-400">Failed to connect to ${node.name}</p>
                    <p class="text-sm text-zinc-400 mt-2">${err.message}</p>
                </div>
            `;
        }
    }
}

    async function refreshAll() {
        const btn = document.querySelector('button');
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Refreshing...`;
        
        await fetchProxmoxNodes();
        
        document.getElementById('last-updated').textContent = 'just now';
        btn.innerHTML = `<i class="fas fa-sync"></i> Refresh All`;
    }

    // Auto refresh every 30 seconds
    setInterval(refreshAll, CONFIG.refreshInterval || 30000);

    // Initial load
    window.onload = refreshAll;
</script>
</body>
</html>
